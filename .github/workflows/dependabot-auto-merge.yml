name: Dependabot Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Wait for all CI checks
        uses: lewagon/wait-on-check-action@v1.7.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          running-workflow-name: 'Dependabot Review'

      - name: Check CI status
        id: check-ci
        run: |
          failed_checks=$(gh pr checks "$PR_URL" --json name,state -q '.[] | select(.state=="FAILURE") | .name')
          if [ -n "$failed_checks" ]; then
            echo "ci_status=FAILURE" >> $GITHUB_OUTPUT
          else
            echo "ci_status=SUCCESS" >> $GITHUB_OUTPUT
          fi
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check high-risk dependencies
        id: check-risk
        run: |
          HIGH_RISK_DEPS="openai|fastapi|pydantic|websockets|uvicorn"
          deps="${{ steps.metadata.outputs.dependency-names }}"
          
          if echo "$deps" | grep -qiE "$HIGH_RISK_DEPS"; then
            echo "is_high_risk=true" >> $GITHUB_OUTPUT
          else
            echo "is_high_risk=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const updateType = '${{ steps.metadata.outputs.update-type }}';
            const dependencyNames = '${{ steps.metadata.outputs.dependency-names }}';
            const prevVersion = '${{ steps.metadata.outputs.previous-version }}';
            const newVersion = '${{ steps.metadata.outputs.new-version }}';
            const isHighRisk = '${{ steps.check-risk.outputs.is_high_risk }}';
            const ciStatus = '${{ steps.check-ci.outputs.ci_status }}';

            let actionText = '';
            let riskWarning = '';
            
            if (isHighRisk === 'true') {
              riskWarning = '\n\n⚠️ **注意：这是高风险依赖更新，请人工仔细审查后再合并！**';
            }
            
            if (ciStatus !== 'SUCCESS') {
              actionText = '❌ CI 未通过，需要人工处理';
            } else {
              actionText = '✅ CI 检查通过';
            }

            const body = `🤖 **Dependabot 更新信息**

            - **依赖**: ${dependencyNames}
            - **更新类型**: ${updateType}
            - **版本变化**: ${prevVersion} → ${newVersion}
            - **CI 状态**: ${actionText}
            - **处理方式**: 🔒 需要人工审查后手动合并${riskWarning}

            ---
            **审查清单：**
            - [ ] 检查版本变更是否包含 breaking changes
            - [ ] 确认与项目代码的兼容性
            - [ ] 运行测试验证
            - [ ] 检查 Python 版本要求
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
