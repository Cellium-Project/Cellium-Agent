name: CI (Multi-Platform Green Release)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  pull_request_target:
    branches: [main, master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  actions: read
  pull-requests: write  

env:
  VERSION: "1.1.1.13"
  PY_VER: "3.12.10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run Unit Tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio requests
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          pytest tests/ -v --tb=short
        shell: pwsh

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio requests
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Integration Check
        env:
          REDIS_HOST: localhost
        run: |
          python main.py &
          PID=$!
          SUCCESS=false
          for i in {1..15}; do
            if curl -s http://127.0.0.1:18000/api/health; then
              SUCCESS=true
              break
            fi
            echo "Waiting for Cellium Agent to ready... ($i/15)"
            sleep 1
          done
          if [ "$SUCCESS" = false ]; then
            echo "Error: Server failed to start or /health endpoint missing"
            kill $PID || true
            exit 1
          fi
          pytest tests/test_heuristic_engine_integration.py -v || true
          kill $PID || true

  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Create Structure
        run: |
          mkdir -p release/runtime
          mkdir -p release/libs
          mkdir -p release/app
          mkdir -p release/components
          mkdir -p release/components/skills
          mkdir -p release/workspace

      - name: Get Windows Runtime
        if: runner.os == 'Windows'
        run: |
          $ver = "${{ env.PY_VER }}".Replace(".","").Substring(0,3)
          curl -L -o py_runtime.zip https://www.python.org/ftp/python/${{ env.PY_VER }}/python-${{ env.PY_VER }}-embed-amd64.zip
          Expand-Archive -Path py_runtime.zip -DestinationPath release/runtime/
          $pthContent = "python$ver.zip`n.`n../libs`n..`nimport site"
          $pthContent | Out-File -FilePath "release/runtime/python$ver._pth" -Encoding ascii
          curl -L -o release/runtime/get-pip.py https://bootstrap.pypa.io/get-pip.py
        shell: pwsh

      - name: Get Unix Runtime (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260303/cpython-3.12.13+20260303-x86_64-unknown-linux-gnu-install_only_stripped.tar.gz"
          else
            URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260303/cpython-3.12.13+20260303-aarch64-apple-darwin-install_only_stripped.tar.gz"
          fi
          echo "Downloading Python from: $URL"
          curl -L $URL | tar -xz -C release/runtime --strip-components=1

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          ./release/runtime/python.exe ./release/runtime/get-pip.py --target release/libs --no-warn-script-location
          ./release/runtime/python.exe -m pip install setuptools wheel --target release/libs
          ./release/runtime/python.exe -m pip install -r requirements.txt --target release/libs
          ./release/runtime/python.exe -m pip install exceptiongroup --target release/libs
        shell: pwsh

      - name: Install Dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m pip install setuptools wheel --target release/libs
          python -m pip install -r requirements.txt --target release/libs
          python -m pip install exceptiongroup --target release/libs
        shell: bash

      - name: Copy Assets (Windows)
        if: runner.os == 'Windows'
        run: |
          rm -f release/runtime/python-3.12.10-embed-amd64.zip || true
          cp -r app/* release/app/
          cp -r components/* release/components/
          cp -r components/skills/* release/components/skills/ || true
          cp -r config release/ || true
          cp -r html release/ || true
          cp -r memory release/ || true
          cp app_icon.ico release/ || true
          cp main.py release/
        shell: bash

      - name: Copy Assets (Unix)
        if: runner.os != 'Windows'
        run: |
          cp -r app/* release/app/
          cp -r components/* release/components/
          cp -r components/skills/* release/components/skills/ || true
          cp -r config release/ || true
          cp -r html release/ || true
          cp -r memory release/ || true
          cp app_icon.ico release/ || true
          cp main.py release/
        shell: bash

      - name: Clean Unix Runtime
        if: runner.os != 'Windows'
        run: |
          rm -rf release/runtime/lib/python3.12/test
          rm -rf release/runtime/lib/python3.12/lib2to3
          rm -rf release/runtime/lib/python3.12/idlelib
          rm -rf release/runtime/lib/python3.12/turtledemo
          rm -rf release/runtime/lib/python3.12/venv
          rm -rf release/runtime/lib/python3.12/ensurepip
          rm -rf release/runtime/lib/python3.12/pydoc_data
          rm -f release/runtime/lib/python3.12/*-info
          rm -f release/runtime/lib/python3.12/dist-info/*
          rm -f release/runtime/lib/python3.12/*.whl
          find release/runtime -name "*.a" -delete
          find release/runtime -name "*.pdb" -delete
          find release/runtime -type f -name "*.so" -exec strip --strip-debug {} \; 2>/dev/null || true
          find release/runtime -name "*.pyc" -delete
          find release/runtime -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          if [ "${{ runner.os }}" == "Linux" ]; then
            rm -rf release/runtime/lib/python3.12/tkinter
            rm -rf release/runtime/lib/python3.12/turtle.py
          fi
        shell: bash

      - name: Create Launcher (Windows)
        if: runner.os == 'Windows'
        run: |
          $lines = @(
            '@echo off',
            'cd /d %~dp0',
            'set PYTHONPATH=%~dp0libs;%PYTHONPATH%',
            'start "" ".\runtime\python.exe" "main.py"'
          )
          $lines | Out-File -FilePath "release/Start-Cellium.bat" -Encoding ascii
        shell: pwsh

      - name: Create Launcher (Unix)
        if: runner.os != 'Windows'
        run: |
          echo '#!/bin/bash' > release/start-cellium.sh
          echo 'DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' >> release/start-cellium.sh
          echo 'export PYTHONPATH="$DIR/libs:$PYTHONPATH"' >> release/start-cellium.sh
          echo '$DIR/runtime/bin/python3 $DIR/main.py' >> release/start-cellium.sh
          chmod +x release/start-cellium.sh

      - name: Prepare Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $PKG_NAME = "Cellium-Agent-Windows"
          Move-Item release $PKG_NAME
          Get-ChildItem -Path $PKG_NAME -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path $PKG_NAME -DestinationPath "$PKG_NAME.zip"
          echo "FINAL_PKG_NAME=$PKG_NAME.zip" >> $env:GITHUB_ENV

      - name: Prepare Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            PKG_NAME="Cellium-Agent-macOS"
          else
            PKG_NAME="Cellium-Agent-Linux"
          fi
          mv release "$PKG_NAME"
          find "$PKG_NAME" -name "__pycache__" -type d -exec rm -rf {} + || true
          tar -czf "$PKG_NAME.tar.gz" "$PKG_NAME"
          echo "FINAL_PKG_NAME=$PKG_NAME.tar.gz" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.FINAL_PKG_NAME }}
          path: ${{ env.FINAL_PKG_NAME }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: Cellium-Agent-*

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Cellium Agent v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## Cellium Agent v${{ env.VERSION }}

            ### 下载 / Download
            - **Windows**: `Cellium-Agent-Windows.zip`
            - **Linux**: `Cellium-Agent-Linux.tar.gz`
            - **macOS**: `Cellium-Agent-macOS.tar.gz`

            ### 使用 / Usage
            **中文**: 解压后运行对应平台的启动脚本即可。
            - Windows: 双击 `Start-Cellium.bat`
            - Linux/macOS: `./start-cellium.sh`

            **English**: Extract and run the launcher for your platform.
            - Windows: Double-click `Start-Cellium.bat`
            - Linux/macOS: Run `./start-cellium.sh`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
