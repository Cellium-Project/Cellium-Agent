memory:
  section: memory
  memory_dir: memory
  short_term:
    max_history: 50
  session_compact:
    enabled: true
    token_threshold: 100000
    tool_call_threshold: 50
    keep_recent_messages: 20
    max_notes_length: 2000
    notes_dir: memory/notes
  long_term:
    db_file: memory/memory_index.db
    hybrid_enabled: true
    embedding:
      enabled: false
      model: ${EMBEDDING_MODEL}
      api_key: ${EMBEDDING_API_KEY}
      base_url: ${EMBEDDING_BASE_URL}
    allow_sensitive_store: false
    default_schema: general
