security:
  command_blacklist:
  - remove-item -recurse -force
  - 'format '
  - diskpart
  - mkfs
  - dd if=
  - shutdown
  - reboot
  - rm -rf /
  - chmod 777 /
  - ':(){ :|:& };:'
  permission_level: standard
  command_timeout: 30
  shell_hard_timeout: 60
  max_output_bytes: 8192
  section: security
  api_key:
    enabled: false
    key: ''
    header_name: X-API-Key
